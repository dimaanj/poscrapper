version: '3.9'

services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./db:/app/db
      - ./session:/app/session
    ports:
      - "3000:3000"

  web:
    build:
      context: ./web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
